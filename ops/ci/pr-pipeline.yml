version: '1.0'
name: pr-pipeline
displayName: PRPipeline
stages:
  - stage:
    name: test
    displayName: Test
    steps:
      - step: build@python
        name: test_python
        displayName: Python tests
        pythonVersion: '3.9'
        commands:
          - python3 -m pip install --upgrade pip
          - pip3 config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          - pip3 install -r requirements.txt
          - python3 -m pytest -q
triggers:
  pr:
    branches:
      include:
        - master
